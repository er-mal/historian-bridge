[project]
name = "axon-core"
version = "0.1.0"
description = "Shared Pydantic domain models for the Axon product suite (mirror of @axon/core TS)."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]
license = { text = "Apache-2.0" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/axon_core"]
