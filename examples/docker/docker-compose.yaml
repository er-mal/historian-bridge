# Demoted form factor — v1 ships as a local binary; this is for CI / buyers
# who insist on Docker. See docs/validation.md §4.
services:
  influx:
    image: influxdb:2.7
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminadmin
      DOCKER_INFLUXDB_INIT_ORG: axon
      DOCKER_INFLUXDB_INIT_BUCKET: historian
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token-please-rotate
    volumes:
      - influx-data:/var/lib/influxdb2

  gateway:
    build:
      context: ../../../..
      dockerfile: apps/05-historian-bridge/examples/docker/Dockerfile
    depends_on:
      - influx
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      HISTORIAN_BRIDGE_BACKEND: memory
      HISTORIAN_BRIDGE_CORS: "http://localhost:3000"

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
    volumes:
      - ../grafana:/etc/grafana/provisioning/datasources:ro

volumes:
  influx-data:
